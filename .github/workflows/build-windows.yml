name: Build Windows amd64

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Validate version sync from daemon
        shell: bash
        run: |
          BLOCKNET_BIN="src-tauri/binaries/blocknet-amd64-windows.exe" npm run --silent sync:version:check

      - name: Export version from VERSION file
        shell: bash
        run: echo "DAEMON_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Build Tauri app
        shell: bash
        run: npx tauri build --config '{"bundle":{"targets":["nsis"],"resources":["binaries/blocknet-amd64-windows.exe"]}}'

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/nsis/*.exe "dist/blocknet-amd64-windows-blocknet_${DAEMON_VERSION}_amd64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-windows-amd64
          path: dist/*
