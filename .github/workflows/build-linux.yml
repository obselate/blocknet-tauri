name: Build Linux amd64

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            flatpak \
            flatpak-builder

      - name: Set up Flatpak runtime
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --noninteractive flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Install npm dependencies
        run: npm ci

      - name: Validate version sync from daemon
        shell: bash
        run: |
          chmod +x src-tauri/binaries/blocknet-amd64-linux
          BLOCKNET_BIN="src-tauri/binaries/blocknet-amd64-linux" npm run --silent sync:version:check

      - name: Export version
        run: echo "DAEMON_VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Patch Tauri linuxdeploy GTK plugin
        run: |
          mkdir -p ~/.cache/tauri
          cp scripts/linuxdeploy-plugin-gtk.sh ~/.cache/tauri/linuxdeploy-plugin-gtk.sh

      - name: Build Tauri app (deb, rpm, appimage)
        env:
          NO_STRIP: "1"
        run: |
          npx tauri build --config '{"bundle":{"targets":["deb","rpm","appimage"],"resources":["binaries/blocknet-amd64-linux"]}}'

      - name: Build Flatpak
        run: bash scripts/build-flatpak.sh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          V="${DAEMON_VERSION}"
          cp "src-tauri/target/release/bundle/deb/blocknet_${V}_amd64.deb"                     "dist/blocknet-amd64-linux-blocknet_${V}_amd64.deb"
          cp "src-tauri/target/release/bundle/rpm/blocknet-${V}-1.x86_64.rpm"                  "dist/blocknet-amd64-linux-blocknet_${V}_x86_64.rpm"
          cp "src-tauri/target/release/bundle/appimage/blocknet_${V}_amd64.AppImage"            "dist/blocknet-amd64-linux-blocknet_${V}_amd64.AppImage"
          cp "src-tauri/target/release/bundle/flatpak/blocknet_${V}_amd64.flatpak"              "dist/blocknet-amd64-linux-blocknet_${V}_amd64.flatpak"

      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-linux-amd64
          path: dist/*
